<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06111f"/>
      <stop offset="0.45" stop-color="#111b33"/>
      <stop offset="1" stop-color="#24051f"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="390" height="844" fill="url(#bg)"/>
  <g opacity="0.22">
    <rect x="18" y="88" width="354" height="160" fill="#00e5ff"/>
    <rect x="68" y="246" width="254" height="388" fill="#b000ff"/>
    <rect x="28" y="638" width="334" height="150" fill="#ff007a"/>
  </g>
  <text x="28" y="50" fill="#00f5ff" font-size="22" font-family="Avenir Next, Arial" font-weight="700">NeonDrift_MVP</text>
  <text x="28" y="84" fill="#f9ff70" font-size="18" font-family="Avenir Next, Arial">05 / Normal Gameplay</text>
  <text x="28" y="118" fill="#d8e7ff" font-size="13" font-family="Avenir Next, Arial">Move left or right between lanes while hazards approach.</text>

  <g transform="translate(88 160)">
    <rect x="0" y="0" width="214" height="470" rx="18" fill="#071e30" stroke="#00f5ff" stroke-width="4"/>
    <line x1="70" y1="18" x2="70" y2="452" stroke="#15f4ff" stroke-width="2" opacity="0.65"/>
    <line x1="142" y1="18" x2="142" y2="452" stroke="#ff00c8" stroke-width="2" opacity="0.65"/>
    <rect x="104" y="0" width="8" height="470" fill="#32e2ff" opacity="0.32"/>
    <rect x="48" y="188" width="48" height="22" rx="3" fill="#ff1d35" filter="url(#glow)"/>
    <rect x="128" y="238" width="48" height="22" rx="3" fill="#ff1d35" filter="url(#glow)"/>
    <rect x="48" y="210" width="42" height="42" rx="5" fill="#ffe200" filter="url(#glow)"/>
    <rect x="150" y="250" width="42" height="42" rx="5" fill="#25ff4a" filter="url(#glow)"/>
    <polygon points="152,432 174,382 196,432" fill="#00eaff" filter="url(#glow)"/>
    <rect x="158" y="432" width="34" height="64" fill="#00eaff" opacity="0.28"/>
  </g>

  <g><text x="28" y="694" fill="#d8e7ff" font-size="14" font-family="Avenir Next, Arial">LEFT / RIGHT drift between lanes. Pink crashes. Glow rewards.</text></g>
  <rect x="20" y="724" width="350" height="76" rx="12" fill="#06111f" opacity="0.82"/>
  <text x="36" y="752" fill="#ffffff" font-size="14" font-family="Avenir Next, Arial">Implementation note</text>
  <text x="36" y="778" fill="#b9d6ff" font-size="13" font-family="Avenir Next, Arial">Readable lane rails, score, pulse, wave, boost, combo.</text>
  <text x="36" y="814" fill="#9ab4d9" font-size="11" font-family="Avenir Next, Arial">Prototype frame for Spec Review / Development / QA screenshot comparison.</text>
</svg>
